<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar">
    <ul>
        <li><a href="{{ url_for('index') }}">HOME</a></li>
        <li><a href="{{ url_for('register') }}">REGISTER</a></li>
    </ul>
</nav>


<div class="container">

    <div class="box">

        <h2>Login</h2>

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>


        <div class="switch">

            Don't have an account?

            <a href="{{ url_for('register') }}">
                Register here
            </a>

        </div>

    </div>

</div>

</body>
</html>
