<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>

<body>


<nav class="navbar">

<ul>

<li>
<a href="{{ url_for('index') }}">HOME</a>
</li>

<li>
<a href="{{ url_for('login') }}">LOGIN</a>
</li>

</ul>

</nav>



<div class="container">

<div class="box">

<h2>Register</h2>


<form method="POST">

<input type="text"
       name="username"
       placeholder="Username"
       required>


<input type="email"
       name="email"
       placeholder="Email"
       required>


<input type="password"
       name="password"
       placeholder="Password"
       required>


<button type="submit">
Register
</button>

</form>


<div class="switch">

Already have an account?

<a href="{{ url_for('login') }}">
Login here
</a>

</div>


</div>

</div>


</body>

</html>
