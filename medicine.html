<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medicine Management</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="dashboard-body">


<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
Pharmacy System
</div>

<ul>

<li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>

<li><a href="{{ url_for('logout') }}">Logout</a></li>

</ul>

</nav>



<!-- PAGE CONTENT -->

<div class="page-container">


<h2 style="color:#2a5bff; margin-bottom:20px;">
Medicine Management
</h2>



<!-- ADD MEDICINE FORM -->

<div class="medicine-form">

<h3>Add New Medicine</h3>

<form method="POST" action="{{ url_for('add_medicine') }}">

<input type="text" name="name" placeholder="Medicine Name" required>

<input type="text" name="batch" placeholder="Batch Number" required>

<input type="number" step="0.01" name="price" placeholder="Price" required>

<input type="date" name="expiry" required>

<button type="submit">
<i class="fa-solid fa-plus"></i>
Add Medicine
</button>

</form>

</div>



<!-- MEDICINE TABLE -->

<h3 style="margin-bottom:15px;">Medicine Stock</h3>

<table class="medicine-table">

<tr>

<th>ID</th>
<th>Name</th>
<th>Batch</th>
<th>Price</th>
<th>Expiry Date</th>
<th>Action</th>

</tr>


{% for medicine in medicines %}

<tr>

<td>{{ medicine[0] }}</td>

<td>{{ medicine[1] }}</td>

<td>{{ medicine[2] }}</td>

<td>{{ medicine[3] }}</td>

<td>{{ medicine[4] }}</td>

<td>

<a href="{{ url_for('delete_medicine', id=medicine[0]) }}"
class="delete-btn">

<i class="fa-solid fa-trash"></i>
Delete

</a>

</td>

</tr>

{% endfor %}


</table>


</div>


</body>
</html>
